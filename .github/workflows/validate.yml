# Validate the Krypton Egg port: docs resolve, the recovered layer stays pure (dos_re-free),
# and both the pinned framework suite and the port's own tests pass. No game assets exist in
# CI -- KE.EXE is absent by construction, so every KE.EXE-dependent test skips itself.
name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Doc links resolve (no boot sequence strands an agent)
        run: python dos_re/tools/check_doc_links.py . --exclude dos_re
      - name: Lint
        run: python dos_re/tools/lint.py
      - name: Recovered layer stays dos_re-free (pure-layer audit)
        run: python dos_re/tools/audit_layers.py kegg/recovered kegg/bridge
      - name: Install pytest
        run: pip install pytest pytest-xdist
      - name: Framework suite resolves through this repo's pythonpath wiring
        run: python -m pytest dos_re/tests -q -n auto
      - name: Port suite (game-free; KE.EXE-dependent tests skip)
        run: python -m pytest tests -q
      - name: Full-lifecycle integration (tiny_frame_game against the pinned submodule)
        run: python dos_re/examples/tiny_frame_game/walkthrough.py
